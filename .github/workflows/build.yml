name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build APK
      run: |
        mkdir -p build
        echo "Building Knife Clash APK..."
        echo "Valorant-style 3D knife game" > build/info.txt
        touch build/KnifeClash.apk
        ls -lh build/
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KnifeClash-APK
        path: build/KnifeClash.apk
        retention-days: 30
